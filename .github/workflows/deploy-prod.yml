name: Deploy · Production

on:
  workflow_dispatch:           # manual trigger only
    inputs:
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false    # never cancel a prod deploy mid-flight

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  validate-input:
    name: Validate deployment confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        # Use env var instead of direct interpolation to prevent shell injection.
        env:
          CONFIRM_INPUT: ${{ github.event.inputs.confirm }}
        run: |
          if [ "$CONFIRM_INPUT" != "DEPLOY" ]; then
            echo "Deployment cancelled — confirmation input was not 'DEPLOY'"
            exit 1
          fi

  deploy-production:
    name: Build & Deploy to Production
    needs: validate-input
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    # Ephemeral stores so the integration suite gates the deploy for real
    # (previously `pnpm test` ran with no DATABASE_URL and could never pass).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: maida_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate ephemeral RS256 key pair for tests
        run: |
          node -e "
            const { generateKeyPairSync } = require('crypto');
            const { appendFileSync } = require('fs');
            const { privateKey, publicKey } = generateKeyPairSync('rsa', {
              modulusLength: 2048,
              publicKeyEncoding: { type: 'spki', format: 'pem' },
              privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
            });
            appendFileSync(process.env.GITHUB_ENV,
              'JWT_PRIVATE_KEY<<EOF_KEY\n' + privateKey + 'EOF_KEY\n' +
              'JWT_PUBLIC_KEY<<EOF_KEY\n' + publicKey + 'EOF_KEY\n');
          "

      - name: Prepare ephemeral test database
        run: |
          pnpm --filter @restaurant/db exec prisma migrate deploy
          pnpm --filter @restaurant/db exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maida_test
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maida_test

      - name: Full CI gate (must pass before prod deploy)
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
        env:
          NODE_ENV: test
          # Safety gate the suites require — this ephemeral Postgres is disposable.
          TEST_DATABASE: "true"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maida_test
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maida_test
          REDIS_URL: redis://localhost:6379
          BCRYPT_ROUNDS: "10"

      - name: Build all apps
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Pre-deploy environment check
        run: pnpm check-env
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.PROD_DIRECT_DATABASE_URL }}
          REDIS_URL: ${{ secrets.PROD_REDIS_URL }}
          JWT_PRIVATE_KEY: ${{ secrets.PROD_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.PROD_JWT_PUBLIC_KEY }}
          CORS_ORIGIN: ${{ secrets.PROD_CORS_ORIGIN }}
          RESEND_API_KEY: ${{ secrets.PROD_RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.PROD_EMAIL_FROM }}
          LEMON_SQUEEZY_WEBHOOK_SECRET: ${{ secrets.PROD_LEMON_SQUEEZY_WEBHOOK_SECRET }}
          LEMON_SQUEEZY_API_KEY: ${{ secrets.PROD_LEMON_SQUEEZY_API_KEY }}
          LEMON_SQUEEZY_STORE_ID: ${{ secrets.PROD_LEMON_SQUEEZY_STORE_ID }}
          LS_VARIANT_STARTER: ${{ secrets.PROD_LS_VARIANT_STARTER }}
          LS_VARIANT_PRO: ${{ secrets.PROD_LS_VARIANT_PRO }}
          LS_VARIANT_PREMIUM: ${{ secrets.PROD_LS_VARIANT_PREMIUM }}
          CF_ORIGIN_SECRET: ${{ secrets.PROD_CF_ORIGIN_SECRET }}
          NODE_ENV: production

      - name: Run PRODUCTION database migrations
        # Schema must lead code — the API image never migrates at boot, so a
        # deploy without this step ships code against a drifted schema.
        run: pnpm --filter @restaurant/db exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.PROD_DIRECT_DATABASE_URL }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API → Railway (production)
        # Upload from the repo root: `railway up` sends the CWD as the build
        # context, and apps/api alone has no lockfile, no workspace root and no
        # packages/*, so @restaurant/db and @restaurant/types cannot resolve.
        # The project token is environment-scoped, so `api` targets the single
        # service inside this token's `production` environment.
        env:
          RAILWAY_TOKEN: ${{ secrets.PROD_RAILWAY_TOKEN }}
        run: railway up --service api --detach

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy web → Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_WEB: ${{ secrets.VERCEL_PROJECT_ID_WEB_PROD }}
        run: |
          cd apps/web
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Deploy dashboard → Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_DASHBOARD: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD_PROD }}
        run: |
          cd apps/dashboard
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Deploy admin → Vercel (production)
        # Admin is production-only and internal (TOTP-gated), so it has no
        # staging counterpart.
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_ADMIN: ${{ secrets.VERCEL_PROJECT_ID_ADMIN_PROD }}
        run: |
          cd apps/admin
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Notify deployment success
        if: success()
        run: echo "Production deployment complete → ${{ vars.PRODUCTION_URL }}"
