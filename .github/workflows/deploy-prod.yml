name: Deploy · Production

on:
  workflow_dispatch:           # manual trigger only
    inputs:
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false    # never cancel a prod deploy mid-flight

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  validate-input:
    name: Validate deployment confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "Deployment cancelled — confirmation input was not 'DEPLOY'"
            exit 1
          fi

  deploy-production:
    name: Build & Deploy to Production
    needs: validate-input
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full CI gate (must pass before prod deploy)
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
        env:
          NODE_ENV: test

      - name: Build all apps
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Deploy API to production
        run: echo "TODO — replace with actual deploy command"
        env:
          DATABASE_URL:    ${{ secrets.PROD_DATABASE_URL }}
          REDIS_URL:       ${{ secrets.PROD_REDIS_URL }}
          JWT_PRIVATE_KEY: ${{ secrets.PROD_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY:  ${{ secrets.PROD_JWT_PUBLIC_KEY }}
          NODE_ENV:        production
          PORT:            ${{ vars.PORT }}
          QUEUE_NAME:      ${{ vars.QUEUE_NAME }}

      - name: Deploy web app to production
        run: echo "TODO — replace with actual deploy command"

      - name: Deploy dashboard to production
        run: echo "TODO — replace with actual deploy command"

      - name: Notify deployment success
        if: success()
        run: echo "Production deployment complete → ${{ vars.PRODUCTION_URL }}"
