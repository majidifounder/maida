name: Deploy · Production

on:
  workflow_dispatch:           # manual trigger only
    inputs:
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false    # never cancel a prod deploy mid-flight

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  validate-input:
    name: Validate deployment confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        # Use env var instead of direct interpolation to prevent shell injection.
        env:
          CONFIRM_INPUT: ${{ github.event.inputs.confirm }}
        run: |
          if [ "$CONFIRM_INPUT" != "DEPLOY" ]; then
            echo "Deployment cancelled — confirmation input was not 'DEPLOY'"
            exit 1
          fi

  deploy-production:
    name: Build & Deploy to Production
    needs: validate-input
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b7c629234533e85f73e7420d7e961edeb9a  # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full CI gate (must pass before prod deploy)
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
        env:
          NODE_ENV: test

      - name: Build all apps
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Pre-deploy environment check
        run: pnpm check-env
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.PROD_DIRECT_DATABASE_URL }}
          REDIS_URL: ${{ secrets.PROD_REDIS_URL }}
          JWT_PRIVATE_KEY: ${{ secrets.PROD_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.PROD_JWT_PUBLIC_KEY }}
          CORS_ORIGIN: ${{ secrets.PROD_CORS_ORIGIN }}
          RESEND_API_KEY: ${{ secrets.PROD_RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.PROD_EMAIL_FROM }}
          NODE_ENV: production

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API → Railway (production)
        env:
          RAILWAY_TOKEN: ${{ secrets.PROD_RAILWAY_TOKEN }}
        run: |
          cd apps/api
          railway up --service api-prod --detach

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy web → Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_WEB: ${{ secrets.VERCEL_PROJECT_ID_WEB_PROD }}
        run: |
          cd apps/web
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Deploy dashboard → Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_DASHBOARD: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD_PROD }}
        run: |
          cd apps/dashboard
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Notify deployment success
        if: success()
        run: echo "Production deployment complete → ${{ vars.PRODUCTION_URL }}"
