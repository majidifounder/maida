name: Deploy · Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI checks
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
        env:
          NODE_ENV: test

      - name: Build all apps
        run: pnpm build
        env:
          NODE_ENV: production

      # ─────────────────────────────────────────
      # Replace the steps below with your actual
      # deployment commands (Railway, Render, etc.)
      # ─────────────────────────────────────────
      - name: Deploy API to staging
        run: echo "TODO — replace with actual deploy command (e.g. railway deploy)"
        env:
          DATABASE_URL:    ${{ secrets.STAGING_DATABASE_URL }}
          REDIS_URL:       ${{ secrets.STAGING_REDIS_URL }}
          JWT_PRIVATE_KEY: ${{ secrets.STAGING_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY:  ${{ secrets.STAGING_JWT_PUBLIC_KEY }}
          NODE_ENV:        staging
          PORT:            ${{ vars.PORT }}
          QUEUE_NAME:      ${{ vars.QUEUE_NAME }}

      - name: Deploy web app to staging
        run: echo "TODO — replace with actual deploy command (e.g. vercel deploy)"

      - name: Deploy dashboard to staging
        run: echo "TODO — replace with actual deploy command"

      - name: Notify deployment success
        if: success()
        run: echo "Staging deployment complete → ${{ vars.STAGING_URL }}"
