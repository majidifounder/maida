name: Deploy · Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI checks
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
        env:
          NODE_ENV: test

      - name: Build all apps
        run: pnpm build
        env:
          NODE_ENV: production

      # ─────────────────────────────────────────
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API → Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.STAGING_RAILWAY_TOKEN }}
        run: |
          cd apps/api
          railway up --service api-staging --detach

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy web → Vercel (staging)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_WEB: ${{ secrets.VERCEL_PROJECT_ID_WEB_STAGING }}
        run: |
          cd apps/web
          vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          vercel build --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --token=$VERCEL_TOKEN

      - name: Deploy dashboard → Vercel (staging)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_DASHBOARD: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD_STAGING }}
        run: |
          cd apps/dashboard
          vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          vercel build --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --token=$VERCEL_TOKEN

      - name: Notify deployment success
        if: success()
        run: echo "Staging deployment complete → ${{ vars.STAGING_URL }}"
