name: Deploy · Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    # Ephemeral stores so the integration suite gates the deploy for real
    # (previously `pnpm test` ran with no DATABASE_URL and failed every push).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: maida_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate ephemeral RS256 key pair for tests
        run: |
          node -e "
            const { generateKeyPairSync } = require('crypto');
            const { appendFileSync } = require('fs');
            const { privateKey, publicKey } = generateKeyPairSync('rsa', {
              modulusLength: 2048,
              publicKeyEncoding: { type: 'spki', format: 'pem' },
              privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
            });
            appendFileSync(process.env.GITHUB_ENV,
              'JWT_PRIVATE_KEY<<EOF_KEY\n' + privateKey + 'EOF_KEY\n' +
              'JWT_PUBLIC_KEY<<EOF_KEY\n' + publicKey + 'EOF_KEY\n');
          "

      - name: Prepare ephemeral test database
        run: |
          pnpm --filter @restaurant/db exec prisma migrate deploy
          pnpm --filter @restaurant/db exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maida_test
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maida_test

      - name: Run CI checks
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
        env:
          NODE_ENV: test
          # Safety gate the suites require — this ephemeral Postgres is disposable.
          TEST_DATABASE: "true"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maida_test
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maida_test
          REDIS_URL: redis://localhost:6379
          BCRYPT_ROUNDS: "10"

      - name: Build all apps
        run: pnpm build
        env:
          NODE_ENV: production

      # ─────────────────────────────────────────

      - name: Run STAGING database migrations
        # The API image never migrates at boot — schema must lead code.
        run: pnpm --filter @restaurant/db exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.STAGING_DIRECT_DATABASE_URL }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API → Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.STAGING_RAILWAY_TOKEN }}
        run: |
          cd apps/api
          railway up --service api-staging --detach

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy web → Vercel (staging)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_WEB: ${{ secrets.VERCEL_PROJECT_ID_WEB_STAGING }}
        run: |
          cd apps/web
          vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          vercel build --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --token=$VERCEL_TOKEN

      - name: Deploy dashboard → Vercel (staging)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_DASHBOARD: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD_STAGING }}
        run: |
          cd apps/dashboard
          vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          vercel build --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --token=$VERCEL_TOKEN

      - name: Notify deployment success
        if: success()
        run: echo "Staging deployment complete → ${{ vars.STAGING_URL }}"
