name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # Ephemeral stores so the API integration suite runs against a REAL
    # Postgres (with the GiST exclusion constraint) and a real Redis — never
    # against a shared or remote database.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: maida_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0   # needed for Turborepo remote cache diff

      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies for known vulnerabilities
        run: pnpm audit --audit-level=high --prod
        continue-on-error: false

      - name: Generate ephemeral RS256 key pair for tests
        run: |
          node -e "
            const { generateKeyPairSync } = require('crypto');
            const { appendFileSync } = require('fs');
            const { privateKey, publicKey } = generateKeyPairSync('rsa', {
              modulusLength: 2048,
              publicKeyEncoding: { type: 'spki', format: 'pem' },
              privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
            });
            appendFileSync(process.env.GITHUB_ENV,
              'JWT_PRIVATE_KEY<<EOF_KEY\n' + privateKey + 'EOF_KEY\n' +
              'JWT_PUBLIC_KEY<<EOF_KEY\n' + publicKey + 'EOF_KEY\n');
          "

      - name: Run database migrations
        run: pnpm --filter @restaurant/db exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maida_test
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maida_test

      - name: Generate Prisma client
        run: pnpm --filter @restaurant/db exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maida_test
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maida_test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maida_test
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maida_test
          REDIS_URL: redis://localhost:6379
          BCRYPT_ROUNDS: "10"

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: success()
        with:
          name: build-${{ github.sha }}
          path: |
            apps/api/dist
            apps/web/dist
            apps/dashboard/dist
          retention-days: 7
