services:
  redis:
    image: redis:7-alpine
    container_name: restaurant_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass $${REDIS_PASSWORD:-devredispass}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$${REDIS_PASSWORD:-devredispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
